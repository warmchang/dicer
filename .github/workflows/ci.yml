name: CI

permissions:
  contents: read

on:
  push:
    branches: [master]
  # Run on all pull requests.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pin all GitHub Actions to commit SHAs rather than mutable tags, so that it is immune to
      # upstream tag rewrites in case of compromise.
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77 # 0.18.0
        with:
          # Disable the cache to avoid any possibility of cache pollution, and since we don't expect
          # very frequent commits.
          cache-save: false

      - name: Run tests
        run: bazel test //...
